apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-deploy
  labels:
    roy: aro
spec:
  replicas: 4
  selector:
    matchLabels:
      roy: aro
  template:
    metadata:
      labels:
        roy: aro
    spec:
      containers:
        - name: kube-pod
          image: arockiyamarry/proj
          workingDir: "/app"
          command: ["python"]
          args: ["-m", "http.server", "8080"]
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: load-balance
spec:
  type: LoadBalancer
  selector:
    roy: aro
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
